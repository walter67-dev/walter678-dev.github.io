<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti Princesa Nay 🌻</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:linear-gradient(to top,#0f2027,#1e3c72,#2a5298);
  overflow:hidden;
  font-family:Arial, sans-serif;
  position:relative;
  text-align:center;
  color:white;
}

/* Fondo estrellas */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background-image:radial-gradient(white 1px, transparent 1px);
  background-size:60px 60px;
  animation:moveStars 80s linear infinite;
  opacity:0.3;
  z-index:0;
}

@keyframes moveStars{
  from{transform:translate(0,0);}
  to{transform:translate(-400px,-400px);}
}

/* Flores */
.flowers{
  position:absolute;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1;
}

.flower{
  position:absolute;
  font-size:24px;
  animation:fall linear infinite;
}

@keyframes fall{
  0%{transform:translateY(-10vh); opacity:1;}
  100%{transform:translateY(110vh); opacity:0;}
}

/* Texto */
h1{font-size:32px;color:#ff3b3b;text-shadow:0 0 20px #ffcc00;margin-bottom:10px;z-index:2;}
h2{font-size:42px;color:#ffcc00;text-shadow:0 0 25px red;margin-bottom:10px;z-index:2;}
h3{font-size:28px;color:#ff4d4d;text-shadow:0 0 20px gold;margin-bottom:20px;z-index:2;}

.heart{
  font-size:50px;
  animation:pulse 1.5s infinite;
  z-index:2;
}

@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.2);}
}

/* Gifs */
.anime-top{
  position:absolute;
  top:20px;
  right:20px;
  width:300px;
  max-width:35vw;
  z-index:2;
}

.anime-bottom{
  position:absolute;
  bottom:20px;
  left:20px;
  width:300px;
  max-width:35vw;
  z-index:2;
}

.anime-top img,
.anime-bottom img{
  width:100%;
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="musica" loop preload="auto">
  <source src="cancion.mp3" type="audio/mpeg">
</audio>

<div class="flowers" id="flowers"></div>

<div class="anime-top">
  <img src="senku.gif" alt="Senku">
</div>

<div class="anime-bottom">
  <img src="mao.gif" alt="Mao">
</div>

<h1>Para ti ❤️</h1>
<h2>Princesa Nay 💛</h2>
<h3>Feliz San Valentín</h3>
<div class="heart">❤️</div>

<script>
// FLORES
const flowersContainer = document.getElementById("flowers");

for(let i=0;i<25;i++){
  const flower = document.createElement("div");
  flower.classList.add("flower");
  flower.innerHTML = "🌸";
  flower.style.left = Math.random()*100+"%";
  flower.style.animationDuration = (5 + Math.random()*5)+"s";
  flower.style.animationDelay = Math.random()*5+"s";
  flowersContainer.appendChild(flower);
}

// MÚSICA (requiere clic por seguridad del navegador)
const musica = document.getElementById("musica");

document.body.addEventListener("click", function(){
  musica.play();
}, { once: true });
</script>

</body>
</html>
