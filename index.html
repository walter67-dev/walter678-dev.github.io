*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:linear-gradient(to top,#0f2027,#1e3c72,#2a5298);
  overflow:hidden;
  font-family:Arial, sans-serif;
  position:relative;
  cursor:pointer;
}

body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background-image:radial-gradient(white 1px, transparent 1px);
  background-size:60px 60px;
  animation:moveStars 80s linear infinite;
  opacity:0.3;
  z-index:0;
}

@keyframes moveStars{
  from{transform:translate(0,0);}
  to{transform:translate(-400px,-400px);}
}

.particles{
  position:absolute;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1;
}

.particles span{
  position:absolute;
  width:4px;
  height:4px;
  background:gold;
  border-radius:50%;
  animation:fall linear infinite;
}

@keyframes fall{
  from{transform:translateY(-10px);opacity:1;}
  to{transform:translateY(100vh);opacity:0;}
}
